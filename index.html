<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#ffffff">
<title>My Site</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Falling snowflakes live on this canvas, behind everything else -->
  <canvas id="snow-canvas"></canvas>

  <!-- Left-side floating icons -->
  <div class="side-icons">
    <button class="icon-btn" id="bell-btn" aria-label="Сповіщення">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
    <button class="icon-btn" id="person-btn" aria-label="Профіль">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>

  <!-- Developer mode password modal -->
  <div id="password-modal" class="modal-overlay">
    <div class="modal-box">
      <h3>Режим розробника</h3>
      <input type="password" id="password-input" placeholder="Пароль" autocomplete="off">
      <div class="modal-actions">
        <button id="password-cancel" class="modal-btn modal-btn-cancel">Скасувати</button>
        <button id="password-submit" class="modal-btn modal-btn-submit">Увійти</button>
      </div>
    </div>
  </div>

  <!-- Banner (status badge sits on its bottom edge) -->
  <header class="banner">
    <img src="banner.jpg" alt="Site banner" class="banner-img">
    <span class="banner-title">Повний Пісець</span>
    <span id="status-text" class="status-badge status-overlay">
      <span class="status-dot"></span>
      <span id="status-label">...</span>
    </span>
  </header>

  <!-- Cyan divider stripe -->
  <div class="banner-stripe"></div>

  <!-- Navigation buttons -->
  <nav class="nav-buttons">
    <button class="nav-btn active" data-page="home">головна</button>
    <button class="nav-btn" data-page="discounts">знижки</button>
    <button class="nav-btn" data-page="promos">акції</button>
    <button class="nav-btn" data-page="news">новини</button>
    <button class="nav-btn" data-page="product">товар</button>
  </nav>

  <!-- Page message area -->
  <div id="page-content" class="page-content"></div>

  <script src="snow.js"></script>
  <script src="status.js"></script>
  <script src="nav.js"></script>
  <script src="bell.js"></script>
  <script src="person.js"></script>
</body>
</html>
